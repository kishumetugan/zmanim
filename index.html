<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>זמני היום ופרשה</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <button class="settings-toggle" onclick="toggleSettings()">⚙️ הגדרות תצוגה</button>
        <div id="settingsPanel" class="settings-panel">
            <div class="settings-row"><span>גודל כתב:</span><input type="range" id="sizeInput" min="14" max="26" oninput="updateStyle('font-size', this.value + 'px', true)"></div>
            <div class="settings-row"><span>צבע רקע:</span><input type="color" id="bgInput" onchange="updateStyle('bg', this.value, true)"></div>
            <button onclick="toggleSettings()" style="background:#7f8c8d; font-size: 12px;">סגור</button>
        </div>
        <div class="header-info">
            <div id="parashaDisplay" class="parasha">טוען...</div>
            <div id="hebrewDateDisplay"></div>
        </div>
        <div class="section">
            <h2>זמני היום: <span id="locName">ירושלים</span></h2>
            <div id="zmanimList"></div>
        </div>
        <div class="section">
            <h2>🚗 מחשבון הגעה</h2>
            <input type="text" id="destInput" placeholder="עיר ורחוב ליעד">
            <button onclick="calculate()">חשב הגעה ושקיעה</button>
            <div id="resultBox" style="display:none; background:#e8f4fd; padding:10px; border-radius:10px; margin-top:10px; text-align:center;">
                <div>הגעה משוערת: <span id="arrTime" style="font-weight:bold">--</span></div>
                <div>זמן לפני שקיעה: <span id="diffTime" style="color:green; font-weight:bold">--</span></div>
                <a id="wazeLink" style="display:block; background:#33ccff; color:black; text-decoration:none; padding:10px; border-radius:8px; margin-top:10px; font-weight:bold;" target="_blank">פתח ב-Waze 📍</a>
            </div>
        </div>
        <button style="background:#27ae60; color:white; border:none; width:100%; padding:10px; border-radius:8px;" onclick="initGPS()">השתמש במיקום GPS שלי 📍</button>
    </div>
    <script src="script2.js"></script>
</body>
</html>
