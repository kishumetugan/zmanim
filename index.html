<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>זמני היום ופרשה</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <button class="settings-toggle" onclick="toggleSettings()">⚙️ הגדרות תצוגה</button>
        
        <div id="settingsPanel" class="settings-panel">
            <div class="settings-row">
                <span>גודל כתב:</span>
                <input type="range" id="sizeInput" min="14" max="26" oninput="updateStyle('font-size', this.value + 'px', true)">
            </div>
            <div class="settings-row">
                <span>צבע רקע:</span>
                <input type="color" id="bgInput" onchange="updateStyle('bg', this.value, true)">
            </div>
            <button onclick="toggleSettings()" style="background:#7f8c8d; font-size: 12px; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">סגור</button>
        </div>

        <div class="header-info">
            <div id="parashaDisplay" class="parasha">טוען...</div>
            <div id="hebrewDateDisplay"></div>
        </div>

        <div class="section">
            <h2>בחר עיר:</h2>
            <select id="citySelect" onchange="changeCity()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; font-size:16px;">
                <option value="31.76,35.21,ירושלים">ירושלים</option>
                <option value="32.08,34.78,תל אביב">תל אביב</option>
                <option value="32.81,34.98,חיפה">חיפה</option>
                <option value="32.09,34.83,בני ברק">בני ברק</option>
                <option value="31.80,34.65,אשדוד">אשדוד</option>
                <option value="31.25,34.79,באר שבע">באר שבע</option>
                <option value="32.32,34.85,נתניה">נתניה</option>
                <option value="32.46,35.04,חריש">חריש</option>
            </select>
        </div>

        <div class="section">
            <h2>זמני היום: <span id="locName">ירושלים</span></h2>
            <div id="zmanimList">
                </div>
        </div>

        <div class="section">
            <h2>🚗 מחשבון הגעה ליעד</h2>
            <input type="text" id="destInput" placeholder="עיר ורחוב ליעד (למשל: בני ברק חזון איש)">
            <button onclick="calculate()" style="cursor: pointer;">
